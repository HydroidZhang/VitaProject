schema: spec-driven

# Vita Mahjong — Godot 4.6 2D 竖屏麻将消除游戏
# 总体设计方案见 openspec/design.md
context: |
  技术栈: Godot 4.6, GDScript
  分辨率: 720×1080 竖屏
  玩法: Shanghai 麻将消除（选牌配对、层叠遮挡）
  阶段进度: P0–P4 已完成，P5 贴图动画进行中
  总设计文档: openspec/design.md

  架构三层: 数据层(TileType/CellData) → 生成层(LayoutLoader/TileAssigner/BoardBuilder) → 表现层(MahjongTile/BoardController)
  坐标: 逻辑网格×2，牌宽2格高3格，GRID_Y_STEP=22px 层间重叠
  规则: 上方无遮挡 + 左右至少一侧空闲 = 可选；同 tile_id 配对消除
